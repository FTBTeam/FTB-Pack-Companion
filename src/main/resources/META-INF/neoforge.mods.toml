modLoader = "javafml"
loaderVersion = "${neoforge_loader_version}"
license = "All Rights Reserved"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "FTB Pack Companion"
#logoFile = "logo.png"
authors = "FTB Team"
description = '''
A Modpack developers best friend
'''

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId = "neoforge"
mandatory = true
versionRange = "${neoforge_version_range}"
ordering = "NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId = "ftblibrary"
required = true
versionRange = "${ftb_library_version_range}"
ordering = "AFTER"
side = "BOTH"

[[mixins]]
config = "ftbpc.mixins.json"
